<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sketch File Explorer Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="h-screen w-screen grid grid-cols-[1fr_2fr] grid-rows-[3rem_1fr] bg-sky-100 text-fg">
      <div class="w-full bg-blue-200 flex items-center p-2 col-span-2">
        <h1 class="text-xl font-semibold">Sketch File Explorer Generator</h1>
      </div>

      <div class="flex flex-col items-center gap-5 p-10 h-full *:w-100">
        <span class="flex flex-col">
          <label for="path">Path:</label>
          <input id="path" class="border-1 border-gray-600 rounded-sm px-2 bg-white" placeholder="~/example/src/" />
        </span>

        <span class="flex flex-col">
          <label>Files (separated by a new line, use "/" postfix for dirs):</label>
          <textarea id="files" class="border-1 border-gray-600 rounded-sm px-2 bg-white" id="files">
example.html
directory/
          </textarea>
        </span>

        <span class="flex flex-col">
          <label for="space">Space in between files:</label>
          <input type="range" min="60" max="200" id="space"/>
        </span>
        <button id="generate" class="bg-blue-200 rounded-sm p-1 cursor-pointer">Generate</button>
      </div>

      <div class="flex flex-col items-center justify-start h-full p-10 w-full">
        <canvas id="canvas" height="550" width="850"></canvas>
        <span class="flex justify-center gap-2 w-full text-slate-800 *:bg-blue-200 *:rounded-sm *:aspect-square *:p-1 *:w-9 *:grid *:place-items-center *:cursor-pointer">
          <button id="download">
            <i data-lucide="download"></i>
          </button>
          <button id="copy">
            <i data-lucide="copy"></i>
          </button>
        </span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
